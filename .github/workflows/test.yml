name: "test"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "cargo test"
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test
